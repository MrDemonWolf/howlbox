name: CI

# Deploy only runs `bun run build`, which does not typecheck, so without
# this a type error or a failing test reaches production green.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # persist-credentials: false leaves no git token in .git/config on
      # the runner. Nothing here does authenticated git afterwards.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # biome ci, not `check`, which writes fixes instead of failing
      - name: Lint and format
        run: bun run check:ci

      # runs vite build then tsc --noEmit per workspace, so this covers
      # the production build as well as types
      - name: Typecheck and build
        run: bun run check-types
        env:
          BASE_PATH: /howlbox/

      - name: Test
        run: bun test
