<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HowlBox - Self-hosted Twitch chat overlay for OBS</title>
    <meta
      name="description"
      content="HowlBox is a free, self-hosted Twitch chat overlay for OBS. Fifteen themes, every emote (7TV, BTTV, FFZ), no login and no keys. The whole overlay is one URL you host yourself."
    />
    <meta
      name="keywords"
      content="twitch chat overlay, obs chat overlay, twitch overlay, obs browser source, stream chat overlay, 7tv, bttv, ffz, self-hosted, howlbox"
    />
    <meta name="author" content="MrDemonWolf, Inc." />
    <meta name="theme-color" content="#00ACED" />

    <!-- crawlers do not run JS, so the canonical + social tags live here, statically -->
    <link rel="canonical" href="https://mrdemonwolf.github.io/howlbox/" />

    <!-- favicons (vite rewrites root-relative hrefs with the deploy base path) -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph: absolute URLs required; hard-coded to the GitHub Pages home -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HowlBox" />
    <meta property="og:title" content="HowlBox - Self-hosted Twitch chat overlay for OBS" />
    <meta
      property="og:description"
      content="A themed Twitch chat overlay you host yourself. Fifteen themes, every emote, no login and no keys. The whole overlay is one URL."
    />
    <meta property="og:url" content="https://mrdemonwolf.github.io/howlbox/" />
    <meta property="og:image" content="https://mrdemonwolf.github.io/howlbox/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="HowlBox - your chat, your colors, your howl." />

    <!-- Twitter / X large card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HowlBox - Self-hosted Twitch chat overlay for OBS" />
    <meta
      name="twitter:description"
      content="A themed Twitch chat overlay you host yourself. Fifteen themes, every emote, no login and no keys. The whole overlay is one URL."
    />
    <meta name="twitter:image" content="https://mrdemonwolf.github.io/howlbox/og.png" />
    <meta name="twitter:image:alt" content="HowlBox - your chat, your colors, your howl." />
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
