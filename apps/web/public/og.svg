<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sky" cx="0.5" cy="-0.1" r="1.1">
      <stop offset="0" stop-color="#0b1c44"/>
      <stop offset="0.45" stop-color="#081231"/>
      <stop offset="1" stop-color="#040713"/>
    </radialGradient>
    <radialGradient id="aurora" cx="0.28" cy="0.2" r="0.75">
      <stop offset="0" stop-color="#00ACED" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00ACED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="0.82" cy="0.85" r="0.7">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="howl" x1="120" y1="300" x2="720" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00ACED"/>
      <stop offset="1" stop-color="#9d84ff"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#33c1f5"/>
      <stop offset="1" stop-color="#00ACED"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#aurora)"/>
  <rect width="1200" height="630" fill="url(#aurora2)"/>

  <!-- broadcast grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 158 H1200 M0 315 H1200 M0 472 H1200 M300 0 V630 M600 0 V630 M900 0 V630"/>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#00ACED" stroke-opacity="0.15" stroke-width="1"/>

  <!-- eyebrow -->
  <g transform="translate(120 150)">
    <rect x="0" y="-5" width="28" height="2" rx="1" fill="#00ACED"/>
    <text x="42" y="0" font-family="'SF Mono','DejaVu Sans Mono',monospace" font-size="20" letter-spacing="4.4" fill="#7fd7ff" dominant-baseline="middle">TWITCH CHAT OVERLAY FOR OBS</text>
  </g>

  <!-- wordmark -->
  <text x="118" y="300" font-family="'Avenir Next','Helvetica Neue',sans-serif" font-weight="800" font-size="140" letter-spacing="-4" fill="#ffffff">HowlBox</text>

  <!-- tagline -->
  <text x="120" y="372" font-family="'Avenir Next','Helvetica Neue',sans-serif" font-weight="600" font-size="40" fill="#ffffff" fill-opacity="0.72">Your chat. Your colors. <tspan fill="url(#howl)" font-weight="800">Your howl.</tspan></text>

  <!-- url chip -->
  <g transform="translate(120 430)">
    <rect x="0" y="0" width="620" height="60" rx="14" fill="#000000" fill-opacity="0.4" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="30" cy="30" r="5" fill="#00ACED"/>
    <text x="52" y="30" font-family="'SF Mono','DejaVu Sans Mono',monospace" font-size="23" fill="#ffffff" fill-opacity="0.55" dominant-baseline="middle">/overlay?channel=<tspan fill="#7fd7ff">you</tspan>&amp;theme=<tspan fill="#7fd7ff">wolf</tspan></text>
  </g>

  <!-- trust row -->
  <g font-family="'SF Mono','DejaVu Sans Mono',monospace" font-size="18" letter-spacing="2" fill="#ffffff" fill-opacity="0.4">
    <circle cx="124" cy="540" r="3" fill="#00ACED"/><text x="138" y="546">MIT LICENSED</text>
    <circle cx="320" cy="540" r="3" fill="#00ACED"/><text x="334" y="546">13 THEMES</text>
    <circle cx="470" cy="540" r="3" fill="#00ACED"/><text x="484" y="546">NO SERVER, NO ACCOUNTS</text>
  </g>

  <!-- paw mark, big, right side -->
  <g transform="translate(880 175) scale(3.6)" fill="url(#mark)" opacity="0.95">
    <path d="M32 33c-6.6 0-12 4.3-12 9.6 0 3.6 2.8 5.4 6.2 5.4 2.2 0 3.9-1 5.8-1s3.6 1 5.8 1c3.4 0 6.2-1.8 6.2-5.4C44 37.3 38.6 33 32 33Z"/>
    <ellipse cx="20.5" cy="28" rx="4" ry="5.2"/>
    <ellipse cx="43.5" cy="28" rx="4" ry="5.2"/>
    <ellipse cx="27" cy="21.5" rx="3.6" ry="4.8"/>
    <ellipse cx="37" cy="21.5" rx="3.6" ry="4.8"/>
  </g>

  <!-- footer brand line -->
  <text x="120" y="595" font-family="'SF Mono','DejaVu Sans Mono',monospace" font-size="18" letter-spacing="2" fill="#ffffff" fill-opacity="0.35">HowlBox BY MrDemonWolf, Inc.</text>
</svg>
